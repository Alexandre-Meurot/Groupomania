<div class="form-card">

  <h2>NOUVEAU POST</h2>

  <!-- formulaire de création d'un nouveau post -->
  <form [formGroup]="postForm">

    <div class="form-group">
      <label for="title">Titre</label>
      <input type="text" id="title" formControlName="title">
    </div>
    <div class="form-group">
      <label for="imageUrl">URL de l'image</label>
      <input type="text" id="imageUrl" formControlName="imageUrl">
    </div>
    <div class="form-group">
      <label for="location">Lieu</label>
      <input type="text" id="location" formControlName="location">
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea type="text" id="description" formControlName="description"></textarea>
    </div>
    <div class="action-buttons">
      <button type="submit" (click)="onSubmitForm()" [disabled]="postForm.invalid">Enregistrer</button>
    </div>

  </form>

</div>

<!-- apperçue du nouveau post -->
<div class="post-card" *ngIf="postPreview$ | async as post">
  <h2>{{ post.title | titlecase }}</h2>
  <p>Mis en ligne le {{ post.createdDate | date: 'd MMMM yyyy, à HH:mm' }}</p>
  <img [src]="post.imageUrl" [alt]="post.title">
  <p *ngIf="post.location">Photo prise à {{ post.location }}</p>
  <p>{{ post.description }}</p>
</div>
